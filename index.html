<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gemini & 監督：タグ実験場 Pro (Wide View)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #1e1e1e;
            margin: 0; padding: 20px;
            height: 100vh; box-sizing: border-box;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .header {
            background: #2c3e50; color: #ecf0f1; padding: 12px 25px;
            font-weight: bold; border-radius: 12px 12px 0 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .main-container {
            display: flex; flex: 1; background: #252526;
            border-radius: 0 0 12px 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        /* 🌟 エディタ側：1枚分の幅 */
        .pane-left {
            flex: 1; display: flex; flex-direction: column;
            background: #1e1e1e; border-right: 1px solid #333; position: relative;
        }
        /* 🌟 ビュー側：2枚分の幅（ここを2にしました！） */
        .pane-right { 
            flex: 2; display: flex; flex-direction: column; background: #ffffff; 
        }

        .clear-btn {
            position: absolute; top: 10px; right: 15px;
            background: rgba(231, 76, 60, 0.2); color: #e74c3c;
            border: 1px solid #e74c3c; padding: 4px 12px;
            border-radius: 6px; font-size: 11px; cursor: pointer; z-index: 5;
            transition: 0.2s;
        }
        .clear-btn:hover { background: rgba(231, 76, 60, 0.4); }
        
        #input-area {
            flex: 1; padding: 40px 20px 20px 20px;
            background: transparent; color: #d4d4d4;
            font-family: 'Consolas', 'Monaco', monospace; font-size: 15px;
            border: none; outline: none; resize: none; line-height: 1.5;
        }
        #output-frame { flex: 1; border: none; background: white; }
        .label { font-size: 11px; color: #888; padding: 8px 20px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="header">
        <span>👨‍💻 TAG EXPERIMENT FIELD Pro (Wide)</span>
        <span style="font-size: 0.75rem;">監督、ビューを広げたゾ！</span>
    </div>
    <div class="main-container">
        <div class="pane-left">
            <div class="label">Editor</div>
            <button class="clear-btn" onclick="clearEditor()">CLEAR</button>
            <textarea id="input-area" spellcheck="false" placeholder="ここにコードを書いてゾ！"></textarea>
        </div>
        <div class="pane-right">
            <div class="label" style="background:#f8f8f8; color:#999;">Preview (Wide Mode)</div>
            <iframe id="output-frame"></iframe>
        </div>
    </div>

    <script>
        const input = document.getElementById('input-area');
        const frame = document.getElementById('output-frame');

        function update() {
            const code = input.value;
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
            localStorage.setItem('tagtest_cache', code);
        }

        input.addEventListener('input', update);

        function clearEditor() {
            if(confirm('全部消しちゃうゾ？')) {
                input.value = '';
                localStorage.removeItem('tagtest_cache');
                update();
                input.focus();
            }
        }

        window.onload = () => {
            const savedCode = localStorage.getItem('tagtest_cache');
            if (savedCode) {
                input.value = savedCode;
            } else {
                input.value = `<div style="padding: 20px; text-align: center;">
    <h1 style="color: #2c3e50;">ビューが広くなったゾ！</h1>
    <p>横幅が必要なデザインのテストもバッチリだゾ。</p>
</div>`;
            }
            update();
        };
    </script>
</body>
</html>
